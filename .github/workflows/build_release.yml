name: Build / Release

on:
  push:
    branches: [ "main" ]
  create:
    tags:
      - '*'

env:
  PROJECTNAME_BASE: ${{ vars.PROJECTNAME || 'hello-world' }}

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Build
      uses: docker://retcon85/toolchain-sms:1.1
      env:
        PROJECTNAME: ${{ github.event_name == 'create' && format('{0}-{1}', env.PROJECTNAME_BASE, github.ref_name) || format('{0}-DEV', env.PROJECTNAME_BASE) }}
      with:
        args: |
          "make clean all"
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: roms
        path: |
          build/*.sms
          build/*.gg
          build/*.rom
        if-no-files-found: error

  release:
    if: ${{ github.event_name == 'create' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: roms
    - name: Release
      if: ${{ github.event_name == 'create' }}
      # if release already exists, attach the output artifacts to it
      # else try to create a release with a discussion post (will fail if discussion not enabled)
      # else try to create a release without a discussion post
      run: |
        OUTPUTS=$({ ls *.sms; ls *.gg; ls *.rom; } 2>/dev/null | tr '\n' ' ') && \
        echo $OUTPUTS | xargs gh release upload main --clobber || \
        echo $OUTPUTS | xargs gh release create main --generate-notes --title '${{ github.repository }} ${{ github.ref_name }}' --discussion-category 'Announcements' || \
        echo $OUTPUTS | xargs gh release create main --generate-notes --title '${{ github.repository }} ${{ github.ref_name }}'
      env:
        GH_TOKEN: ${{ github.token }}
